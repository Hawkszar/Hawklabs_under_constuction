<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hawklabs — Lore Drops</title>
  <meta name="description" content="Classified lore drops from the Birds of War universe." />
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b0f14;color:#e9eef5}
    .wrap{max-width:1100px;margin:0 auto;padding:28px}
    .kicker{display:inline-flex;gap:10px;align-items:center;padding:6px 12px;border-radius:999px;background:#111a24;border:1px solid #1f2a38;color:#FF9F1A;font-weight:700}
    h1{margin:14px 0 6px;font-size:40px}
    p{opacity:.9;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:18px}
    .card{background:#101823;border:1px solid #1f2a38;border-radius:16px;padding:16px}
    .tag{display:inline-block;margin-top:8px;font-size:12px;letter-spacing:.08em;color:#FF9F1A}
    a{color:inherit;text-decoration:none}
    .btn{display:inline-block;margin-top:10px;padding:10px 12px;border-radius:12px;border:1px solid #1f2a38;background:#0f1620}
    .btn:hover{border-color:#FF9F1A}
    .footer{margin-top:28px;opacity:.75;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">CLASSIFIED // LORE DROPS</div>
    <h1>Lore Drops</h1>
    <p>
      Small intel packets from the <strong>Birds of War</strong> universe.
    </p>

    <div class="grid">
      <!-- Drop #1 -->
      <a class="card" href="/assets/peck-tripshot-card.png">
        <div class="tag">DROP #001</div>
        <h2 style="margin:10px 0 6px;">LT. Peck “Trip-Shot”</h2>
        <p style="margin:0;opacity:.9;">
          The day the noise became calm. Three shots. One instant. One new rhythm.
        </p>
        <div class="btn primary">Open Drop</div>
      </a>

      <!-- Future slot -->
      <div class="card" style="opacity:.75;">
        <div class="tag">NEXT DROP</div>
        <h2 style="margin:10px 0 6px;">Incoming…</h2>
        <p style="margin:0;">More intel soon. Stay sharp.</p>
      </div>
    </div>

    
    
  </div>
</body>
</html>
